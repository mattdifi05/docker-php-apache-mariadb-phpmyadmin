<VirtualHost *:80>
    ServerName localhost
    ServerAlias *.localhost 127.0.0.1
    UseCanonicalName Off

    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]

    # Nega qualunque accesso diretto fuori da public (incluso /private)
    <Directory "/var/www/html">
        Require all denied
    </Directory>

    # Consenti SOLO public
    <Directory "/var/www/html/public">
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>
