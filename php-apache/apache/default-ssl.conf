<VirtualHost *:443>
    ServerName localhost
    ServerAlias *.localhost 127.0.0.1
    UseCanonicalName Off

    SSLEngine on
    SSLCertificateFile /etc/apache2/certs/localhost.fullchain.crt
    SSLCertificateKeyFile /etc/apache2/certs/localhost.key

    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        AllowOverride All
        Require all granted
    </Directory>

    # ---- phpMyAdmin sotto https://<host>/phpmyadmin ----
    ProxyRequests Off
    ProxyPreserveHost On

    # Forward headers utili per app dietro proxy
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-SSL "on"

    # IMPORTANTE: il trailing slash evita problemi di path
    ProxyPass        /phpmyadmin/  http://phpmyadmin/ nocanon
    ProxyPassReverse /phpmyadmin/  http://phpmyadmin/

    # Se vuoi anche /phpmyadmin senza slash finale
    RedirectMatch 301 ^/phpmyadmin$ /phpmyadmin/

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
